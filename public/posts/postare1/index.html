<script type="text/javascript">
    async function typewriter(text, elementId, waitAfter) {
        var n = 0,
            isTag = false
        addText = "";
        const el = document.getElementById(elementId);

        const wait = () => new Promise(r => setTimeout(r, waitAfter));
        const nowait = () => new Promise(r => r());

        const render = () => el.innerHTML = (text.slice(0, n + 1) + addText);

        const cursor = document.createElement('span');
        cursor.id = "blink";

        el.style.setProperty("--cursor-visibility", "visible");
        while (n < text.length) {
            if (text.charAt(n + 1) === "<") isTag = true;
            if (text.charAt(n + 1) === ">") isTag = false;

            if (isTag) {
                n++;
                continue;
            }

            requestAnimationFrame(render);

            if (waitAfter === 0) {
                await nowait();
            } else {
                await wait();
            }

            n++;
        }
        el.style.setProperty("--cursor-visibility", "collapse");
    }

    function parseDelay(d) {
        const parsed = parseInt(d, 10);
        if (isNaN(parsed)) return 0;
        return parsed;
    }

    const titleDelay = parseDelay("0"),
        contentDelay = parseDelay("0");
    const typeeffetct = async () => {
        await typewriter("\u003cspan id=\u0027terminal\u0027\u003e\u003ch1 id=\u0027title\u0027\u003eTHM-SOURCE Writeup\u003c\/h1\u003e\u003c\/span\u003e", "activity-title", titleDelay);
        await typewriter("\u003cspan id=\u0027terminal\u0027\u003e\u003cp\u003eTryHackMe-Source: Exploit a recent vulnerability and hack Webmin, a web-based system configuration tool\u003c\/p\u003e\n\u003cp\u003e10.10.38.68 - \u0026gt; source.thm\nI\u0026rsquo;m going to start the challenge by scanning the ip with nmap as in every challenge.\n\u003cimg src=\u0022\/images\/image1.png\u0022 alt=\u0022image1\u0022\u003e\u003c\/p\u003e\n\u003cp\u003eThe output:\nPort 22 for ssh and 10000 is the default port for Webmin\nAnd the link would be https:\/\/10.10.38.68:10000\n\u003cimg src=\u0022\/images\/image2.png\u0022 alt=\u0022image2\u0022\u003e\u003c\/p\u003e\n\u003cp\u003eUnfortunately we don\u0026rsquo;t know the username and password to ssh and webmin and I tried to search directories with gobuster, but nothing ☹.\n\u003cimg src=\u0022\/images\/image3.png\u0022 alt=\u0022image3\u0022\u003e\u003c\/p\u003e\n\u003cp\u003eThe last option was to look for an exploit on Metasploit.\n\u003cimg src=\u0022\/images\/image4.png\u0022 alt=\u0022image4\u0022\u003e\u003c\/p\u003e\n\u003cp\u003eAnd yep, there are more vulnerabilities, and the exploit which I used is 5 “exploit\/linux\/http\/webmin_backdoor”\n\u003cimg src=\u0022\/images\/image5.png\u0022 alt=\u0022image5\u0022\u003e\u003c\/p\u003e\n\u003cp\u003eAnd now is need to set the LPORT, RHOSTS and ssl to true\n\u003cimg src=\u0022\/images\/image6.png\u0022 alt=\u0022image6\u0022\u003e\u003c\/p\u003e\n\u003cp\u003eand to run the exploit, simply type run or exploit\n-to have a stable shell we need to run the following commands\necho \u0026ldquo;import pty; pty.spawn(\u0026rsquo;\/bin\/bash\u0026rsquo;)\u0026rdquo; \u0026gt; \/tmp\/anyname.py\npython \/tmp\/filename.py\nNow we got the shell, and all we need to do now is to find the flags.\n\u003cimg src=\u0022\/images\/image7.png\u0022 alt=\u0022image7\u0022\u003e\u003c\/p\u003e\n\u003c\/span\u003e", "activity-content", contentDelay);
        return;
    }

    typeeffetct()
</script>
